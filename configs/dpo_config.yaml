# DPO Fine-tuning Configuration

# Model settings
model:
  base_model: "meta-llama/Llama-2-7b-hf"
  reference_model: "meta-llama/Llama-2-7b-hf"
  device: "cuda"
  dtype: "float16"

# LoRA configuration
lora:
  enabled: true
  r: 8
  lora_alpha: 16
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

# Quantization (optional)
quantization:
  enabled: false
  method: "int4"  # "int4", "int8", or "none"
  double_quant: true
  quant_type: "nf4"

# DPO training settings
training:
  # Learning rate
  learning_rate: 1e-4
  lr_scheduler: "cosine"
  warmup_steps: 100

  # Training parameters
  num_epochs: 3
  batch_size: 8
  max_length: 512
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  # DPO specific
  beta: 0.5
  label_smoothing: 0.0

  # Logging and saving
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  save_total_limit: 3

# Data settings
data:
  train_file: "data/preference_data_train.json"
  val_file: "data/preference_data_val.json"
  template_type: "alpaca"  # "alpaca", "chatml", "mistral"
  preprocessing_num_workers: 4

# Output
output:
  output_dir: "./checkpoints/dpo"
  run_name: "dpo_llama2_7b"

# Optimization
optimization:
  use_8bit: false
  gradient_checkpointing: true
  flash_attention: false

# Evaluation
evaluation:
  eval_dataset_size: 100
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  load_best_model_at_end: true

# Seed
seed: 42
